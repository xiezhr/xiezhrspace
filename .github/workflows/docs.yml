name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: 安装依赖
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: 构建 VuePress 站点
        run: pnpm docs:build
        working-directory: docs

      # ✅【新增】构建后在输出目录创建 CNAME
      # 因为 public/CNAME 没被自动复制，手动创建
      - name: 添加自定义域名
        run: echo "docs.xiezhrspace.cn" > CNAME
        working-directory: docs

      # ✅【修正】build_dir 指向构建后的站点根目录
      - name: 部署到 GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: docs           # ← 原来是 docs/src/.vuepress/dist，现在改为 docs
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}